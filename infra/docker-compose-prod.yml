version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ai_blog_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_blog_network

  backend:
    image: ${BACKEND_IMAGE}
    container_name: ai_blog_backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      HERO_OPENROUTER_API_KEY: ${HERO_OPENROUTER_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      NODE_ENV: production
    networks:
      - ai_blog_network

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: ai_blog_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    entrypoint: ["./wait-for-backend.sh"]
    networks:
      - ai_blog_network

volumes:
  postgres_data:
    name: ai_blog_postgres_data

networks:
  ai_blog_network:
    name: ai_blog_network